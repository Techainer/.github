name: Reusable Claude Review

on:
  workflow_call:
    inputs:
      max_turns:
        description: "Max conversation turns for cost control"
        required: false
        default: "5"
        type: string
    secrets:
      ZAI_AUTH_TOKEN:
        required: true

jobs:
  review:
    if: >
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review') &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      checks: read
      statuses: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ZAI_AUTH_TOKEN }}
          show_full_output: true
          settings: |
            {
              "env": {
                "ANTHROPIC_AUTH_TOKEN": "${{ secrets.ZAI_AUTH_TOKEN }}",
                "ANTHROPIC_BASE_URL": "https://api.z.ai/api/anthropic",
                "ANTHROPIC_DEFAULT_SONNET_MODEL": "GLM-4.7"
              }
            }
          claude_args: |
            --max-turns ${{ inputs.max_turns }}
            --allowed-tools "Bash(gh:*),Bash(grep:*),Bash(head:*),Bash(cat:*),Read,Grep,Glob"
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }}.

            ## Instructions
            1. Get the diff: `gh pr diff ${{ github.event.pull_request.number }}`
            2. If a CLAUDE.md file exists in the repo root, read it for project rules
            3. Review ONLY the new/changed code in the diff for:
               - Bugs, logic errors, missing edge cases
               - Security issues
               - CLAUDE.md violations (if file exists)
               - Missing error handling
            4. Post a single summary comment with findings using:
               `gh pr comment ${{ github.event.pull_request.number }} --body "..."`

            ## Rules
            - Do NOT read source files beyond the diff unless absolutely needed
            - Focus on HIGH-CONFIDENCE issues only (things that will definitely break)
            - If no significant issues found, comment: "✅ No significant issues found."
            - Keep the review concise and actionable
            - Format each issue as: **[severity]** file:line — description
